<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Admin Dashboard</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== AUTH SCREEN ===== -->
    <div id="screen-auth" class="screen active">
      <div class="auth-loading">
        <div class="spinner"></div>
        <p>Authenticating...</p>
      </div>
    </div>

    <!-- ===== DASHBOARD ===== -->
    <div id="screen-dashboard" class="screen">
      <div id="dashboard-content"></div>
    </div>

    <!-- ===== ORDERS LIST ===== -->
    <div id="screen-orders" class="screen">
      <div id="orders-content"></div>
    </div>

    <!-- ===== ORDER DETAIL ===== -->
    <div id="screen-order-detail" class="screen">
      <div id="order-detail-content"></div>
    </div>

    <!-- ===== CONVERSATIONS LIST ===== -->
    <div id="screen-messages" class="screen">
      <div id="messages-content"></div>
    </div>

    <!-- ===== THREAD VIEW ===== -->
    <div id="screen-thread" class="screen">
      <div id="thread-content"></div>
    </div>

    <!-- ===== RETURNS LIST ===== -->
    <div id="screen-returns" class="screen">
      <div id="returns-content"></div>
    </div>

    <!-- ===== RETURN DETAIL ===== -->
    <div id="screen-return-detail" class="screen">
      <div id="return-detail-content"></div>
    </div>

    <!-- ===== CUSTOMER PROFILE ===== -->
    <div id="screen-customer" class="screen">
      <div id="customer-content"></div>
    </div>

    <!-- ===== TAB BAR ===== -->
    <nav class="tab-bar" id="tab-bar">
      <div class="tab active" data-tab="dashboard" onclick="Admin.navigate('#/')">
        <span class="tab-icon">&#x1f4ca;</span>
        <span>Dashboard</span>
      </div>
      <div class="tab" data-tab="orders" onclick="Admin.navigate('#/orders')">
        <span class="tab-icon">&#x1f4e6;</span>
        <span>Orders</span>
        <span class="tab-badge" id="orders-badge" style="display:none">0</span>
      </div>
      <div class="tab" data-tab="messages" onclick="Admin.navigate('#/messages')">
        <span class="tab-icon">&#x1f4ac;</span>
        <span>Messages</span>
        <span class="tab-badge" id="messages-badge" style="display:none">0</span>
      </div>
      <div class="tab" data-tab="returns" onclick="Admin.navigate('#/returns')">
        <span class="tab-icon">&#x21a9;</span>
        <span>Returns</span>
        <span class="tab-badge" id="returns-badge" style="display:none">0</span>
      </div>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
